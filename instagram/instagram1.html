     <section class="second-screen">

        <div class="first-number">
            <header class="container flex">
                <div class="plus"><i class="fa-solid fa-plus plus1"></i></div>
                <div class="logo1">instagram
                    <i class="fa-solid fa-angle-down"></i>
                </div>
                <div class="heart"><i class="fa-regular fa-heart heart1"></i></div>
            </header>
            <div class="following hide">
                <div class="followed">
                    <button class="following-1 same1">
                        <i class="fa-solid fa-user-group"></i>Following
                    </button>
                    <button class="favorites same1">
                        <i class="fa-regular fa-star"></i>Favorites
                    </button>
                </div>
            </div>
            
            <section class="section-2">
                <div class="image-des-sqaure">
                    <div class="image-circle">
                        <img src="img/face1.jpg" class="image-photo">
                        <div class="add-plus">
                            <i class="fa-solid fa-plus"></i>
                        </div>
                    </div>
                    <p class="id-name">omakr kutakoli</p>
                </div>

                <div class="box-1" id="container"></div>
            </section>

            <section class="box-2"></section>
        </div>


        <div class="second-number hide">
            <div class="reels1">
                <video src="video/Video-2.mp4" controls autoplay muted loop></video>
                <i class="fa-solid fa-arrow-left back"></i>

                <div class="left-id">
                    <div class="up">
                        <img src="img/face11.jpg">
                        <h5>omakr kutakoli</h5>
                    </div>
                    <div class="down-describe">
                        <p>like:</p>
                    </div>
                </div>

                <div class="right-like">
                    <i class="fa-regular fa-heart"></i>
                    <i class="fa-regular fa-message"></i>
                    <i class="fa-solid fa-share"></i>
                    <i class="fa-solid fa-bars"></i>
                </div>
            </div>
        </div>


        <div class="third-number hide">
            <a href="/">a</a>
        </div>

        <div class="four-number hide">
            <div class="a">
                <div class="search">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" placeholder="Search with Meta AI">
                </div>
            </div>

            <div class="video-full" id="video-full"></div>
        </div>

        <div class="five-number hide">
            <a href="/">r</a>
        </div>

        <footer class="footer">
            <button class="home same"><i class="fa-regular fa-house"></i></button>
            <button class="reels same"><i class="fa-solid fa-clapperboard"></i></button>
            <button class="message same"><i class="fa-regular fa-message"></i></button>
            <button class="search1 same"><i class="fa-solid fa-magnifying-glass"></i></button>
            <button class="account same"><i class="fa-regular fa-circle-user"></i></button>
        </footer>
     </section>
