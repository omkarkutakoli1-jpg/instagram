<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <img src="img/background.jpg" alt="">
    <main>
        <div class="container">
            <div class="screen active" id="LOGIN">
                <h1>LOGIN</h1>
                <div class="input_icon">
                    <i class="fa-solid fa-at"></i>
                    <input required type="text" placeholder="Email">
                </div>
                <div class="input_icon">
                    <i class="fa-solid fa-lock"></i>
                    <input type="text" placeholder="password">
                </div>

                <button class="login">LOGIN</button>

                <p>New here?<span class="create" id="create1"> Create an Account</span></p>
            </div>

            <div class="screen" id="SIGNUP">
                <h1>SIGNUP</h1>
                <div class="input_icon">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" placeholder="Firstname">
                </div>
                <div class="input_icon">
                    <i class="fa-solid fa-at"></i>
                    <input type="text" placeholder="Email">
                </div>
                <div class="input_icon">
                    <i class="fa-solid fa-lock"></i>
                    <input type="text" placeholder="Password">
                </div>
                <div class="input_icon">
                    <i class="fa-solid fa-lock"></i>
                    <input type="text" placeholder="Repeat Password">
                </div>

                <button class="login">SIGNUP</button>

                <p>Already have an Account?<span class="create" id="create"> Login</span></p>
            </div>
        </div>
    </main>

    <script src="login.js"></script>
</body>
</html>
