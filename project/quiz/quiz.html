<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz</title>
    <link rel="stylesheet" href="quiz.css">
</head>
<body>

    <div class="container">
        <div class="screen active" id="start_screen">
            <h1>Quiz Time!</h1>
            <p>Test your knowledge with these fun questions</p>
            <button class="start_button" id="start_button">Start Quiz</button>
        </div>

        <div class="screen" id="quiz_screen">
            <p class="question"></p>
            <div class="question_box">
                <p class="question_number">Question <span class="start_question"></span> of <span class="final_question">5</span></p>

                <p class="score">Score: <span class="correct_answer">0</span></p>
            </div>
            <div class="answer_container" id="answer_container"></div>
        </div>

        <div class="screen" id="result_screen">
            <h1>Quiz Results</h1>
            <div class="result">
                <p>You scored <span class="correct_answer">0</span> out of <span class="final_question">5</span></p>
                <h2>good effort</h2>
            </div>
            <button class="start_button" id="">restart Quiz</button>
        </div>
    </div>
    

    <script src="quiz.js"></script>
</body>
</html>
