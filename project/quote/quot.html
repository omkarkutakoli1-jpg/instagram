<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quote of the day</title>
    <link rel="stylesheet" href="quote.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    
    <div class="container">
        <div class="header">
            <h1>Quote of the Day</h1>
        </div>

        <div class="describe">
            <span><i class="fas fa-quote-left left"></i></span>
            <p class="quote">This is why I loved techonology; if you used it right, it counld give you the power and privacy</p>
            <span><i class="fas fa-quote-right right"></i></span>
        </div>
        <div class="author1">
            <p class="author">-- <span class="author2">vishal</span></p>
        </div>

        <div class="hr"></div>

        <div class="button">
            <div class="sound_copy">
                <button class="same" id="speak"><i class="fa-brands fa-speakap"></i></button>
                <button class="same" id="copy"><i class="fa-solid fa-copy"></i></button>
                <button class="same" id="twitter"><i class="fa-brands fa-twitter"></i></button>
            </div>
            <div>
                <button class="new">New Quote</button>
            </div>
        </div>
    </div>

    <script src="quote.js"></script>
    <script src="quotes1.js"></script>
</body>
</html>
