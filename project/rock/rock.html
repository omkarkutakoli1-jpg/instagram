<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock</title>
    <link rel="stylesheet" href="rock.css">
</head>
<body>
    
    <div class="container">
        <h1>Rock Paper Scissors</h1>
        <div class="game">
            <button class="rock"  onclick="playGame('rock');">Rock</button>
            <button class="rock"  onclick="playGame('scissors');">scissors</button>
            <button class="rock"  onclick="playGame('paper');">Paper</button>
            <button class="rock"  id="rest">Rest</button>
        </div>
        <div class="own">
            <p class="win"></p>
            <p class="computer"></p>
            <p class="win_lose_tie"></p>
        </div>
    </div>

    <script src="rock.js"></script>
</body>
</html>
