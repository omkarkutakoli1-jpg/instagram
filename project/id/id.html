<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.css" integrity="sha512-kJlvECunwXftkPwyvHbclArO8wszgBGisiLeuDFwNM8ws+wKIw0sv1os3ClWZOcrEB2eRXULYUsm8OVRGJKwGA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="id.css">
</head>
<body>
    <section class="section">
        <div class="container">
            <div class="blue">
                <div class="image">
                    <img src="img/face.jpg" alt="">
                </div>
            </div>

            <div class="white">
                <div class="username">
                    <p class="p1">CodingLab</p>
                    <p class="p2">Youtube & Blogger</p>
                </div>

                <div class="clone">
                    <div class="fackbook same">
                        <i class="ri-facebook-fill"></i>
                    </div>
                    <div class="twick same">
                        <i class="ri-twitter-fill"></i>
                    </div>
                    <div class="instram same">
                        <i class="ri-instagram-line"></i>
                    </div>
                    <div class="youtube same">
                        <i class="ri-youtube-fill"></i>
                    </div>
                </div>

                <div class="subscribe">
                    <button class="subscribe1 same1">Subscribe</button>
                    <button class="message same1">Message</button>
                </div>

                <div class="like">
                    <div class="love">
                        <i class="ri-heart-line"></i>
                        <p>60k</p>
                    </div>
                    <div class="love">
                        <i class="ri-chat-3-line"></i>
                        <p>20k</p>
                    </div>
                    <div class="love o">
                        <i class="ri-share-forward-line"></i>
                        <p>12k</p>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
